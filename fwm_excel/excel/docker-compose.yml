services:
  mysql:
    image: mysql:8.4
    container_name: excel-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 654321
      MYSQL_DATABASE: excel
      MYSQL_USER: fhy
      MYSQL_PASSWORD: 654321
    ports:
      - "3307:3306"
    volumes:
      - mysql-data:/var/lib/mysql

  app:
    image: excel-app:latest
    container_name: excel-fwm
    depends_on:
      - mysql
    ports:
      - "8888:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/excel?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      SPRING_DATASOURCE_USERNAME: fhy
      SPRING_DATASOURCE_PASSWORD: 654321

volumes:
  mysql-data: